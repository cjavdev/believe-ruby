# This workflow is triggered when a GitHub release is created.
# It can also be run manually to re-publish to rubygems.org in case it failed for some reason.
# You can run this workflow by navigating to https://www.github.com/cjavdev/believe-ruby/actions/workflows/publish-gem.yml
name: Publish Gem
on:
  workflow_dispatch:

  release:
    types: [published]

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: false
      - run: |-
          bundle install

      - name: Verify RubyGems API key
        env:
          GEM_HOST_API_KEY: ${{ secrets.BELIEVE_GEM_HOST_API_KEY || secrets.GEM_HOST_API_KEY }}
        run: |
          if [ -z "${GEM_HOST_API_KEY}" ]; then
            echo "::error::GEM_HOST_API_KEY secret is not set (or resolves to empty) for this job."
            exit 1
          fi
          echo "key length: ${#GEM_HOST_API_KEY}"
          status=$(curl -sS -o /tmp/rg_body -w "%{http_code}" \
            -H "Authorization: ${GEM_HOST_API_KEY}" \
            https://rubygems.org/api/v1/api_key.json)
          echo "rubygems auth status: ${status}"
          cat /tmp/rg_body; echo
          if [ "${status}" != "200" ]; then
            echo "::error::RubyGems rejected the API key (HTTP ${status}). Check the secret value, scopes, and MFA settings."
            exit 1
          fi
          if ! grep -q '"push_rubygem"' /tmp/rg_body; then
            echo "::error::API key is valid but missing the 'push_rubygem' scope."
            exit 1
          fi

      - name: Publish to RubyGems.org
        run: |
          bash ./bin/publish-gem
        env:
          # `RUBYGEMS_HOST` is only required for private gem repositories, not https://rubygems.org
          RUBYGEMS_HOST: ${{ secrets.BELIEVE_RUBYGEMS_HOST || secrets.RUBYGEMS_HOST }}
          GEM_HOST_API_KEY: ${{ secrets.BELIEVE_GEM_HOST_API_KEY || secrets.GEM_HOST_API_KEY }}
